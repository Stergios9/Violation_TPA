<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Παραβάσεις - Παραβιάσεις Τουρκικών Διεισδύσεων</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .panel {
            background: white;
            padding: 20px;
            border-radius: 10px;
            min-height: 600px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .title {
            text-align: center;
            margin: 20px 0;
            font-weight: bold;
        }

        label {
            font-weight: 600;
            margin-top: 10px;
        }
        .selected-value {
            font-size: 0.9rem;
            color: #0d6efd;
            margin-top: 5px;
            min-height: 20px;
        }
        .form-group-custom {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group-custom .form-select {
            width: 45%;
            margin: 0 auto;
        }

        .form-group-custom label {
            display: block;
            margin-bottom: 5px;
        }
        .section-divider {
            height: 5px;
            background-color: #1A494D;
            margin: 30px 0;
            border-radius: 10px;
            box-shadow: 0 2px 10px rgba(26, 73, 77, 0.4);
        }
        /*.quantity-input {*/
        /*    width: 50%;*/
        /*    margin: 0 auto;*/
        /*    text-align: center;*/
        /*}*/
    </style>
</head>

<body>

<div class="container-fluid">

    <h3 class="title">Παραβάσεις - Παραβιάσεις Τουρκικών Διεισδύσεων</h3>

    <!-- FORM START -->
    <form th:action="@{/incident/save}" method="post">

        <!-- Ημερομηνία -->
        <div class="row mb-3">
            <div class="col-12 text-center">
                <label>Ημερομηνία:</label>
                <input type="date"
                       class="form-control w-25 mx-auto"
                       name="incidentDate"
                       required>
            </div>
        </div>

        <div class="row">

            <!-- ΑΡΙΣΤΕΡΗ ΣΤΗΛΗ -->
            <div class="col-md-4">
                <div class="panel">

                    <h5>Εισερχόμενα Αεροσκάφη</h5>

                    <div class="form-group-custom">

                        <label>ΜΑΧΗΤΙΚΑ</label>

                        <select id="fighterSelect" class="form-select">
                            <option value="">-- ΤΥΠΟΣ --</option>

                            <th:block th:each="a : ${aircraftGrouped['ΜΑΧΗΤΙΚΑ']}">
                                <option th:value="${a.id}"
                                        th:text="${a.typeName}">
                                </option>
                            </th:block>
                        </select>

                        <div class="row mt-2">

                            <div class="col-4">
                                <input
                                        id="fighterQty"
                                        type="number"
                                        class="form-control"
                                        min="1"
                                        placeholder="Πλήθος">
                            </div>

                            <div class="col-4">

                                <div class="form-check mt-2">

                                    <input
                                            id="fighterArmed"
                                            class="form-check-input"
                                            type="checkbox">

                                    <label class="form-check-label">
                                        Οπλισμένο
                                    </label>

                                </div>

                            </div>

                            <div class="col-4">

                                <button
                                        type="button"
                                        class="btn btn-success"
                                        onclick="addFighter()">

                                    Προσθήκη

                                </button>

                            </div>

                        </div>

                        <div id="fighterList" class="mt-3"></div>
                    </div>

            <div class="section-divider"></div>

                    <div class="form-group-custom">

                        <label>ΑΦΝΣ</label>

                        <select id="afnsSelect" class="form-select">
                            <option value="">-- ΤΥΠΟΣ --</option>

                            <th:block th:each="a : ${aircraftGrouped['ΑΦΝΣ']}">
                                <option th:value="${a.id}"
                                        th:text="${a.typeName}">
                                </option>
                            </th:block>
                        </select>

                        <div class="row mt-2">

                            <div class="col-8">
                                <input id="afnsQty"
                                       type="number"
                                      class="form-control"
                                       min="1"
                                       placeholder="Πλήθος">
                            </div>

                            <div class="col-4">
                                <button type="button"
                                        class="btn btn-success"
                                        onclick="addItem('afnsSelect','afnsQty','afnsList')">
                                    Προσθήκη
                                </button>
                            </div>

                        </div>

                        <div id="afnsList" class="mt-3"></div>

                    </div>

            <div class="section-divider"></div>

                    <div class="form-group-custom">

                        <label>Ε/Π</label>

                        <select id="epSelect" class="form-select">
                            <option value="">-- ΤΥΠΟΣ --</option>

                            <th:block th:each="a : ${aircraftGrouped['Ε/Π']}">
                                <option th:value="${a.id}"
                                        th:text="${a.typeName}">
                                </option>
                            </th:block>
                        </select>

                        <div class="row mt-2">

                            <div class="col-8">
                                <input id="epQty"
                                       type="number"
                                      class="form-control"
                                       min="1"
                                       placeholder="Πλήθος">
                            </div>

                            <div class="col-4">
                                <button type="button"
                                        class="btn btn-success"
                                        onclick="addItem('epSelect','epQty','epList')">
                                    Προσθήκη
                                </button>
                            </div>

                        </div>

                        <div id="epList" class="mt-3"></div>

                    </div>
            <div class="section-divider"></div>
                    <div class="form-group-custom">

                        <label>ΜΕΑ</label>

                        <select id="meaSelect" class="form-select">
                            <option value="">-- ΤΥΠΟΣ --</option>

                            <th:block th:each="a : ${aircraftGrouped['ΜΕΑ']}">
                                <option th:value="${a.id}"
                                        th:text="${a.typeName}">
                                </option>
                            </th:block>
                        </select>

                        <div class="row mt-2">

                            <div class="col-8">
                                <input id="meaQty"
                                       type="number"
                                      class="form-control"
                                       min="1"
                                       placeholder="Πλήθος">
                            </div>

                            <div class="col-4">
                                <button type="button"
                                        class="btn btn-success"
                                        onclick="addItem('meaSelect','meaQty','meaList')">
                                    Προσθήκη
                                </button>
                            </div>

                        </div>
                        <div id="meaList" class="mt-3"></div>
                    </div>

            <div class="section-divider"></div>

                    <div class="form-group-custom">
                        <label>ΑΛΛΑ</label>

                        <select id="allaSelect" class="form-select">
                            <option value="">-- ΤΥΠΟΣ --</option>

                            <th:block th:each="a : ${aircraftGrouped['ΑΛΛΑ']}">
                                <option th:value="${a.id}"
                                        th:text="${a.typeName}">
                                </option>
                            </th:block>
                        </select>

                        <div class="row mt-2">

                            <div class="col-8">
                                <input id="allaQty"
                                       type="number"
                                      class="form-control"
                                       min="1"
                                       placeholder="Πλήθος">
                            </div>

                            <div class="col-4">
                                <button type="button"
                                        class="btn btn-success"
                                        onclick="addItem('allaSelect','allaQty','allaList')">
                                    Προσθήκη
                                </button>
                            </div>

                        </div>

                        <div id="allaList" class="mt-3"></div>

                    </div>
                </div>
            </div>

            <!-- ΚΕΝΤΡΙΚΗ ΣΤΗΛΗ -->
            <!-- ΚΕΝΤΡΙΚΗ ΣΤΗΛΗ -->
            <div class="col-md-4">
                <div class="panel">

                    <h5>Περιοχή Εισόδου</h5>

                    <div class="form-group-custom">

                        <label>ΠΕΡΙΟΧΗ ΕΙΣΟΔΟΥ</label>

                        <select id="entryAreaSelect" class="form-select">
                            <option value="">-- ΤΥΠΟΣ --</option>

                            <th:block th:each="area : ${entryAreas}">
                                <option th:value="${area.id}"
                                        th:text="${area.name}">
                                </option>
                            </th:block>
                        </select>

                        <div class="row mt-2">

                            <div class="col-8">
                                <input id="entryAreaQty"
                                       type="number"
                                      class="form-control"
                                       min="1"
                                       placeholder="Πλήθος">
                            </div>

                            <div class="col-4">
                                <button type="button"
                                        class="btn btn-success"
                                        onclick="addItem('entryAreaSelect',
                                             'entryAreaQty',
                                             'entryAreaList')">

                                    Προσθήκη

                                </button>
                            </div>

                        </div>

                        <div id="entryAreaList" class="mt-3"></div>
                    </div>

                <div class="section-divider"></div>
                </div>
            </div>


            <!-- ΔΕΞΙΑ ΣΤΗΛΗ -->
            <div class="col-md-4">
                <div class="panel">

                    <h5>Αναγνώριση</h5>

                    <div class="form-group-custom">

                        <label>ΣΥΝΟΛΟ Α/Φ ΑΝΑΓΝΩΡΙΣΗΣ</label>

                        <select id="friendlySelect" class="form-select">
                            <option value="">-- ΤΥΠΟΣ --</option>

                            <th:block th:each="f : ${friendlyAircraftList}">
                                <option th:value="${f.id}"
                                        th:text="${f.typeName}">
                                </option>
                            </th:block>
                        </select>

                        <div class="row mt-2">

                            <div class="col-8">
                                <input id="friendlyQty"
                                       type="number"
                                      class="form-control"
                                       min="1"
                                       placeholder="Πλήθος">
                            </div>

                            <div class="col-4">
                                <button type="button"
                                        class="btn btn-success"
                                        onclick="addItem('friendlySelect',
                                             'friendlyQty',
                                             'friendlyList')">

                                    Προσθήκη

                                </button>
                            </div>

                        </div>
                        <div id="friendlyList" class="mt-3"></div>
                    </div>

                    <div class="section-divider"></div>
                </div>

            </div>

        </div>

        <!-- SUBMIT -->
        <div class="row mt-4">
            <div class="col-12 text-center">
                <button type="submit" class="btn btn-primary btn-lg">
                    Αποθήκευση Incident
                </button>
            </div>
        </div>

    </form>
    <!-- FORM END -->

</div>

<script>
    function updateSelected(selectElement, targetId) {
        const text = selectElement.options[selectElement.selectedIndex].text;
        const target = document.getElementById(targetId);

        if (selectElement.value === "") {
            target.innerText = "";
        } else {
            target.innerText =  text;
        }
    }


    function updateAircraft(selectElement,
                            detailsId,
                            textId) {

        const details =
            document.getElementById(detailsId);

        const text =
            document.getElementById(textId);

        if(selectElement.value === ""){

            details.style.display = "none";
            text.innerText = "";

            return;
        }

        text.innerText =
            selectElement.options[
                selectElement.selectedIndex
                ].text;

        details.style.display = "block";
    }

    let fighterCounter = 0;

    function addFighter() {

        const select =
            document.getElementById("fighterSelect");

        const qty =
            document.getElementById("fighterQty");

        const armed =
            document.getElementById("fighterArmed");

        if (select.value === "") {
            alert("Επιλέξτε τύπο αεροσκάφους");
            return;
        }

        if (qty.value === "") {
            alert("Συμπληρώστε πλήθος");
            return;
        }

        const aircraft =
            select.options[
                select.selectedIndex
                ].text;

        const list =
            document.getElementById("fighterList");

        const row =
            document.createElement("div");

        row.className =
            "row border rounded p-2 mb-2 align-items-center";

        row.innerHTML = `
        <div class="col-4">
            ${aircraft}
        </div>

        <div class="col-3">
            ${qty.value}
        </div>

        <div class="col-3">
            ${armed.checked ? 'Οπλισμένο' : 'Άοπλο'}
        </div>

        <div class="col-2 text-end">
            <button
                type="button"
                class="btn btn-danger btn-sm"
                onclick="this.closest('.row').remove()">
                X
            </button>
        </div>
    `;

        list.appendChild(row);

        fighterCounter++;

        select.selectedIndex = 0;
        qty.value = "";
        armed.checked = false;
    }

    function addItem(selectId, qtyId, listId) {

        const select =
            document.getElementById(selectId);

        const qty =
            document.getElementById(qtyId);

        if(select.value === ""){
            alert("Επιλέξτε τύπο");
            return;
        }

        if(qty.value === ""){
            alert("Συμπληρώστε πλήθος");
            return;
        }

        const text =
            select.options[
                select.selectedIndex
                ].text;

        const list =
            document.getElementById(listId);

        const row =
            document.createElement("div");

        row.className =
            "row border rounded p-2 mb-2 align-items-center";

        row.innerHTML = `
        <div class="col-8">
            ${text}
        </div>

        <div class="col-2">
            ${qty.value}
        </div>

        <div class="col-2 text-end">
            <button
                type="button"
                class="btn btn-danger btn-sm"
                onclick="this.closest('.row').remove()">
                X
            </button>
        </div>
    `;

        list.appendChild(row);

        select.selectedIndex = 0;
        qty.value = "";
    }


</script>

</body>
</html>
