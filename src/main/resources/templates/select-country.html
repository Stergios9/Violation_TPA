<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Επιλογή Χώρας</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background-image:
                    linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.65)),
                    url('/images/f-16_2.png');

            background-size:cover;
            background-position:center 30%;
            background-repeat:no-repeat;
            background-attachment:fixed;

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            font-family:'Segoe UI',sans-serif;
        }

        .page-container{

            width:100%;
            max-width:650px;

            background:rgba(255,255,255,.95);

            border-radius:20px;

            padding:60px 50px;

            box-shadow:0 15px 35px rgba(0,0,0,.4);

        }

        .brand-title{

            color:#1A494D;

            font-size:2.3rem;

            font-weight:800;

            text-align:center;

            margin-bottom:10px;

        }

        .subtitle{

            text-align:center;

            color:#6c757d;

            margin-bottom:35px;

            font-size:1rem;

        }

        .form-label{

            font-weight:600;

            color:#495057;

        }

        .form-select{

            border-radius:10px;

            padding:12px;

            height:50px;

            transition:.3s;
        }

        .form-select:focus{

            border-color:#1A494D;

            box-shadow:0 0 0 .25rem rgba(26,73,77,.15);

        }

        .btn-next{

            width:100%;

            margin-top:25px;

            padding:12px;

            border:none;

            border-radius:10px;

            background:#1A494D;

            color:white;

            font-weight:700;

            letter-spacing:1px;

            transition:.3s;
        }

        .btn-next:hover{

            background:#143a3d;

            color:white;

            transform:translateY(-2px);

            box-shadow:0 5px 15px rgba(0,0,0,.2);

        }

    </style>

</head>

<body>

<div class="page-container">

    <h2 class="brand-title">
        ΠΑΡΑΒΑΣΕΙΣ - ΠΑΡΑΒΙΑΣΕΙΣ ΤΟΥΡΚΙΚΩΝ Α/Φ
    </h2>

    <p class="subtitle">
        Επιλέξτε τη χώρα για την οποία θα καταχωρήσετε στοιχεία.
    </p>

    <form th:action="@{/select-country}" method="post">

        <div class="mb-4">

            <label class="form-label">
                Χώρα
            </label>

            <select name="country"
                    class="form-select"
                    required>

                <option value="">
                    -- Επιλογή Χώρας --
                </option>

                <option th:each="c : ${countries}"
                        th:value="${c.name}"
                        th:text="${c.name}">
                </option>

            </select>

        </div>

        <button type="submit"
                class="btn btn-next">

            Συνέχεια

        </button>

    </form>

</div>

</body>
</html>
