        <form th:action="@{/login}"
              method="POST">

            <div class="mb-3">
                <label class="form-label">Username</label>

                <input type="text"

                       placeholder="Το όνομα χρήστη σας"

                <span id="usernameError"

            <div class="mb-4">

                       class="form-control"

                    Είσοδος

                    <hr class="text-muted">
                    <span class="position-absolute top-50 start-50 translate-middle bg-white px-2 text-muted small">ή</span>
                </div>

                <a th:href="@{/user/signUp}" class="btn btn-signup">Δημιουργία Λογαριασμού</a>
            </div>
        </form>

    </div>
</div>

    // Validate username input
    document.addEventListener("DOMContentLoaded", function () {

        const usernameInput = document.getElementById("username");
        const passwordInput = document.querySelector('input[name="password"]');
        const loginBtn = document.getElementById("loginBtn");

        const usernameError = document.getElementById("usernameError");
        const passwordError = document.getElementById("passwordError");

        function validateForm() {

            let valid = true;

            // USERNAME RULES
            const username = usernameInput.value.trim();
            if (username.length < 3) {
                usernameError.textContent = "Το username πρέπει να έχει τουλάχιστον 3 χαρακτήρες.";
                usernameInput.classList.add("is-invalid");
                usernameInput.classList.remove("is-valid");
                valid = false;
            } else {
                usernameError.textContent = "";
                usernameInput.classList.remove("is-invalid");
                usernameInput.classList.add("is-valid");
            }

            // PASSWORD RULES
            const password = passwordInput.value;

            const regex = /^[A-Za-z0-9!@#$%^&*()_+=\-]{6,}$/;

            if (password.length === 0) {
                passwordError.textContent = "Ο κωδικός είναι υποχρεωτικός.";
                passwordInput.classList.add("is-invalid");
                passwordInput.classList.remove("is-valid");
                valid = false;
            }
            else if (!regex.test(password)) {
                passwordError.textContent = "Ο κωδικός πρέπει να έχει τουλάχιστον 6 χαρακτήρες.";
                passwordInput.classList.add("is-invalid");
                passwordInput.classList.remove("is-valid");
                valid = false;
            }
            else {
                passwordError.textContent = "";
                passwordInput.classList.remove("is-invalid");
                passwordInput.classList.add("is-valid");
            }

            // BUTTON STATE
            loginBtn.disabled = !valid;
        }

        usernameInput.addEventListener("input", validateForm);
        passwordInput.addEventListener("input", validateForm);
    });

</script>
